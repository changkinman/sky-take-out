server:
  port: 8080

spring:
  profiles:
    active: dev
  main:
    allow-circular-references: true
  datasource:
    druid:
      driver-class-name: ${luojia.datasource.driver-class-name}
      url: jdbc:mysql://${luojia.datasource.host}:${luojia.datasource.port}/${luojia.datasource.database}?serverTimezone=Asia/Shanghai&useUnicode=true&characterEncoding=utf-8&zeroDateTimeBehavior=convertToNull&useSSL=false&allowPublicKeyRetrieval=true
      username: ${luojia.datasource.username}
      password: ${luojia.datasource.password}
  redis:
    host: ${luojia.redis.host}
    port: ${luojia.redis.port}
    password: ${luojia.redis.password}
    database: ${luojia.redis.database}

mybatis:
  #mapper配置文件
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.Luojia.entity
  configuration:
    #开启驼峰命名
    map-underscore-to-camel-case: true

logging:
  level:
    com:
      sky:
        mapper: debug
        service: info
        controller: info

luojia:
  jwt:
    # 设置jwt签名加密时使用的秘钥
    admin-secret-key: itcast
    # 设置jwt过期时间
    admin-ttl: 7200000
    # 设置前端传递过来的令牌名称
    admin-token-name: token

    user-secret-key: itheima
    user-ttl: 7200000
    user-token-name: authentication
  alioss:
    endpoint: ${luojia.alioss.endpoint}
    access-key-id: ${luojia.alioss.access-key-id}
    access-key-secret: ${luojia.alioss.access-key-secret}
    bucket-name: ${luojia.alioss.bucket-name}
  wechat:
    appid: ${luojia.wechat.appid}
    secret: ${luojia.wechat.secret}

